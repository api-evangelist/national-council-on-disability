aid: national-council-on-disability
name: National Council on Disability
description: >-
  The National Council on Disability (NCD) is an independent federal agency
  that advises the President, Congress, and other federal agencies on disability
  policy and programs. Established in 1978, the NCD promotes equal opportunity,
  economic self-sufficiency, independent living, and full participation in all
  areas of society for individuals with disabilities. The agency conducts
  research, gathers information, and provides recommendations to improve
  policies, programs, and services. NCD publishes policy reports spanning civil
  rights, healthcare, transportation, employment, housing, and emergency
  management for people with disabilities.
