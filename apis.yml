apis:
  - aid: national-council-on-disability:ncd-foia-data
    name: National Council on Disability FOIA Data
    description: >-
      FOIA-accessible data from the National Council on Disability including
      performance and results act reports, congressional budget justification
      reports, financial audit reports, strategic plans, bylaws, stakeholder
      letters, and all NCD policy reports. Data is available in PDF, XML, CSV,
      and ZIP formats through the NCD FOIA e-Library.
    humanURL: https://www.ncd.gov/foia/
    baseURL: https://www.ncd.gov
    tags:
    - FOIA
    - Open Data
    - Government Reports
    - Policy
    properties:
    - type: Documentation
      url: https://www.ncd.gov/foia/
    - type: DataAPI
      url: https://www.ncd.gov/foia/
  - aid: national-council-on-disability:ncd-policy-reports
    name: National Council on Disability Policy Reports
    description: >-
      Comprehensive archive of NCD policy reports dating back to 1984 covering
      disability civil rights, healthcare, transportation, employment, housing,
      financial assistance, and emergency management. Reports include
      recommendations to the President, Congress, and federal policymakers on
      national disability policy.
    humanURL: https://www.ncd.gov/reports/
    baseURL: https://www.ncd.gov
    tags:
    - Policy Reports
    - Civil Rights
    - Healthcare
    - Employment
    - Housing
    - Transportation
    properties:
    - type: Documentation
      url: https://www.ncd.gov/reports/
    - type: DataAPI
      url: https://www.ncd.gov/reports/
  - aid: national-council-on-disability:ncd-accountability-data
    name: National Council on Disability Accountability Reports
    description: >-
      Performance, accountability, and budget data from the National Council on
      Disability. Includes Annual Performance Reports, Congressional Budget
      Justification Reports, financial audits, and EEO policy statements
      providing transparency into agency operations and resource allocation.
    humanURL: https://www.ncd.gov/accountability/
    baseURL: https://www.ncd.gov
    tags:
    - Accountability
    - Budget
    - Performance
    - Transparency
    properties:
    - type: Documentation
      url: https://www.ncd.gov/accountability/
    - type: DataAPI
      url: https://www.ncd.gov/accountability/congressional-budget-justification-reports/
