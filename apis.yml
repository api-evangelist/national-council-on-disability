  - type: Features
    data:
    - name: Policy Reports Archive
      description: >-
        Comprehensive archive of NCD policy reports dating back to 1984
        covering all areas of disability policy including civil rights,
        healthcare, employment, housing, and transportation.
    - name: FOIA e-Library
      description: >-
        Proactively published collection of NCD documents including bylaws,
        performance reports, budget justifications, financial audits, and
        strategic plans available for public download.
    - name: Congressional Testimony Archive
      description: >-
        Archive of NCD testimony before Congress on disability policy issues,
        providing insight into legislative advocacy and policy recommendations
        over time.
    - name: Disability Policy Toolkits
      description: >-
        Practical toolkits and fact sheets on disability rights and policy
        topics to help individuals, advocates, and policymakers understand
        and implement disability-inclusive practices.
    - name: Newsroom and Stakeholder Letters
      description: >-
        Press releases, newsroom updates, and letters to federal agency
        stakeholders documenting NCD's ongoing policy engagement and
        recommendations.
  - type: UseCases
    data:
    - name: Disability Policy Research
      description: >-
        Access NCD's comprehensive reports to research disability policy
        history, current recommendations, and policy gaps across federal
        programs and agencies.
    - name: FOIA Document Retrieval
      description: >-
        Submit FOIA requests or access the FOIA e-Library to retrieve
        agency financial, performance, and operational documents.
    - name: Legislative Advocacy
      description: >-
        Use NCD testimony archives and policy letters as reference material
        for disability rights advocacy and legislative engagement.
    - name: Federal Agency Compliance
      description: >-
        Access NCD recommendations to understand federal agency obligations
        under disability rights laws including the ADA, Rehabilitation Act,
        and other statutes.
    - name: Academic Research
      description: >-
        Download NCD policy reports, progress reports, and data for academic
        research on disability policy, independent living, and civil rights.
  - type: Integrations
    data:
    - name: ADA.gov
      description: >-
        NCD's work intersects with the Americans with Disabilities Act
        guidance provided through ADA.gov maintained by the Department of
        Justice.
    - name: Disability.gov
      description: >-
        NCD recommendations inform resources available through federal
        disability information portals providing access to government benefits
        and services.
    - name: data.gov
      description: >-
        Federal government open data portal where related disability datasets
        from agencies like SSA, HHS, and DOL are cataloged and made
        available for download.
    - name: USASpending.gov
      description: >-
        NCD federal spending data is publicly accessible through
        USASpending.gov as part of federal transparency requirements.
  - type: Solutions
    data:
    - name: Disability Policy Leadership
      description: >-
        NCD provides independent policy analysis and recommendations to the
        three branches of government on all matters affecting people with
        disabilities.
    - name: Federal Agency Accountability
      description: >-
        NCD monitors federal agency compliance with disability rights laws
        and makes recommendations for program improvements and new
        legislation.
    - name: Public Education
      description: >-
        NCD publishes toolkits, fact sheets, and reports to educate the
        public and policymakers about disability rights and best practices
        for inclusion.
